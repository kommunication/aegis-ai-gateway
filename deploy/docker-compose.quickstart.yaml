# AEGIS AI Gateway — Quickstart
#
# Usage:
#   cp .env.example .env   # add at least one provider API key
#   docker compose -f deploy/docker-compose.quickstart.yaml up
#
# The gateway auto-runs migrations and prints a demo API key on first start.
# Health check:  curl http://localhost:8080/aegis/v1/health

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis-dev
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - aegis-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - aegis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: aegis-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
      - "${METRICS_HOST_PORT:-9090}:9090"
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: aegis
      DB_PASSWORD: aegis-dev
      DB_NAME: aegis
      DATABASE_URL: postgres://aegis:aegis-dev@postgres:5432/aegis?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AEGIS_SEED_DEMO_KEY: "true"
      OPA_BUNDLE_PATH: "/etc/aegis/configs/policies"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/aegis/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  aegis-pgdata:
  aegis-redis-data:
